---
# Source: largestack/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: largestack
  labels:
    app.kubernetes.io/name: largestack
    app.kubernetes.io/instance: largestack
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: largestack-1.0.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: largestack
      app.kubernetes.io/instance: largestack
  template:
    metadata:
      labels:
        app.kubernetes.io/name: largestack
        app.kubernetes.io/instance: largestack
      annotations:
        # Roll pods when secrets change — operator hint.
        checksum/secret: e6f69d8e84f27ca5c768f1ecec67cb52cfa7c2f5c4b57d206650702232bec6dd
    spec:
      serviceAccountName: largestack
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: largestack
          image: "rivailabs/largestack:1.0.0"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
          ports:
            - name: http
              containerPort: 8787
              protocol: TCP
          env:
            - name: LARGESTACK_ENV
              value: "production"
            - name: LARGESTACK_IN_CONTAINER
              value: "1"
            - name: LARGESTACK_LOG_LEVEL
              value: "INFO"
            - name: LARGESTACK_RATE_LIMIT_BACKEND
              value: "inprocess"
            - name: LARGESTACK_RATE_LIMIT_BURST
              value: "10"
            - name: LARGESTACK_RATE_LIMIT_PER_MINUTE
              value: "60"
          envFrom:
            - secretRef:
                name: largestack-secrets
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
