name: Cross Platform Validation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and validation deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test,office]
          python -m pip install respx pytest-timeout beautifulsoup4 duckdb
      - name: Compile
        run: python -m compileall -q largestack
      - name: Unit tests
        run: python -m pytest tests -q --tb=short --disable-warnings -ra
