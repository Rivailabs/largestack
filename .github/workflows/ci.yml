name: CI
on: [push, pull_request]
jobs:
  test:
    name: Tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ matrix.python }}' }
      - run: pip install -e .[dev]
      - run: pip install cryptography 'httpx[http2]' pydantic-settings opentelemetry-api opentelemetry-sdk
      - run: pytest tests/ -q
      - run: bash scripts/check_changelog.sh

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff
      # Keep CI focused on correctness blockers for the full legacy tree.
      # Broader style cleanup runs separately so pre-existing nits do not block release validation.
      - run: ruff check largestack/ tests/ --select=E9,F821,F822,F823
      - run: ruff format --check largestack/_observe/traces_db.py largestack/_core/builtin_tools/_url_validator.py largestack/_dashboard/rate_limit.py

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true   # informational until full coverage; flip to false in v0.5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e .[dev]
      - run: pip install mypy
      - run: mypy largestack/ --ignore-missing-imports --follow-imports=silent --no-strict-optional || true

  docker_smoke:
    name: Docker E2E smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t largestack-agentic-ai:smoke .
      - name: Start container
        run: |
          docker run -d --name largestack-smoke \
            -p 8787:8787 \
            -e LARGESTACK_DASHBOARD_KEY=ci-test-key \
            largestack-agentic-ai:smoke
      - name: Wait for healthcheck (max 60s)
        run: |
          for i in {1..30}; do
            health=$(docker inspect --format='{{.State.Health.Status}}' largestack-smoke 2>/dev/null || echo "starting")
            echo "Attempt $i: $health"
            if [ "$health" = "healthy" ]; then exit 0; fi
            sleep 2
          done
          docker logs largestack-smoke
          exit 1
      - name: Verify dashboard responds
        run: |
          # /health is public
          curl --fail http://localhost:8787/health
          # Protected route requires the key
          curl --fail -H "X-API-Key: ci-test-key" http://localhost:8787/api/metrics
      - name: Stop container
        if: always()
        run: docker rm -f largestack-smoke
