name: Security
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # weekly on Monday

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      # Skip B101 (assert) and B311 (random) — not relevant for our code.
      # Skip tests/ — bandit complains about test asserts.
      - run: bandit -r largestack/ --skip B101,B311 --severity-level medium --confidence-level medium -f txt

  pip_audit:
    name: pip-audit (CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install pip-audit
        continue-on-error: true
      - run: pip install -e ".[test]"
      - run: pip-audit --skip-editable

  sbom:
    name: SBOM (supply chain / LLM03)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: python -m largestack._cli.main sbom --fmt cyclonedx --out sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.json

  guardrail_redteam:
    name: Guardrail red-team
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]"
      # exits non-zero if any CORE adversarial attack passes the guardrails
      - run: python -m largestack._test.redteam

  trivy_docker:
    name: Trivy (Docker image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t largestack-agentic-ai:scan .
      # v0.4.0: split into two scans — CRITICAL fails the build, HIGH is informational.
      - name: Trivy CRITICAL (fails build)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "largestack-agentic-ai:scan"
          format: "table"
          exit-code: "1"  # fail build on CRITICAL
          ignore-unfixed: true
          severity: "CRITICAL"
      - name: Trivy HIGH (informational)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: "largestack-agentic-ai:scan"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          severity: "HIGH"
