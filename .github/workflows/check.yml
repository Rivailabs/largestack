name: CHANGELOG Check
on: [push, pull_request]
jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install deps
        run: |
          pip install -e .
          pip install pytest pytest-asyncio cryptography 'httpx[http2]' pydantic-settings opentelemetry-api opentelemetry-sdk hypothesis
      - name: Run check
        run: bash scripts/check_changelog.sh
