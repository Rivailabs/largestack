apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "largestack.fullname" . }}
  labels:
    {{- include "largestack.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "largestack.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "largestack.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "largestack.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: largestack
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: LARGESTACK_LOG_LEVEL
              value: {{ .Values.largestack.logLevel | quote }}
            - name: LARGESTACK_AUDIT_LOG_PATH
              value: {{ .Values.largestack.auditLogPath | quote }}
            {{- if .Values.redis.enabled }}
            - name: LARGESTACK_REDIS_URL
              value: redis://{{ .Release.Name }}-redis-master:6379
            {{- end }}
            {{- if .Values.postgresql.enabled }}
            - name: LARGESTACK_POSTGRES_DSN
              value: postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}
            {{- end }}
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            - name: LARGESTACK_OTEL_SAMPLE_RATE
              value: {{ .Values.otel.sampleRate | quote }}
            {{- end }}
          {{- if .Values.largestack.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.largestack.envFromSecret }}
          {{- end }}
          volumeMounts:
            - name: agent-config
              mountPath: /config
              readOnly: true
            - name: audit-logs
              mountPath: /var/log/largestack
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: agent-config
          configMap:
            name: {{ include "largestack.fullname" . }}-config
        - name: audit-logs
          emptyDir:
            sizeLimit: 10Gi
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
