{{- if not .Values.secrets.dashboardKey -}}
{{- fail "secrets.dashboardKey must be set. Generate one with: openssl rand -hex 32" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "largestack.fullname" . }}-secrets
  labels: {{- include "largestack.labels" . | nindent 4 }}
type: Opaque
stringData:
  LARGESTACK_DASHBOARD_KEY: {{ .Values.secrets.dashboardKey | quote }}
  {{- if .Values.secrets.openaiKey }}
  LARGESTACK_OPENAI_API_KEY: {{ .Values.secrets.openaiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicKey }}
  LARGESTACK_ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicKey | quote }}
  {{- end }}
  {{- if .Values.secrets.googleKey }}
  LARGESTACK_GOOGLE_API_KEY: {{ .Values.secrets.googleKey | quote }}
  {{- end }}
  {{- if .Values.secrets.redisUrl }}
  LARGESTACK_REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  {{- end }}
