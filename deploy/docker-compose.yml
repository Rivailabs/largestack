# Largestack AI — Hardened Docker Compose Stack
#
# Copy deploy/.env.example to deploy/.env and replace every change-me value.
# Internal datastores are exposed only inside the Docker network. Put the app
# behind a TLS reverse proxy for internet-facing deployments.

services:
  largestack:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
    container_name: largestack-app
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      LARGESTACK_ENV: ${LARGESTACK_ENV:-production}
      LARGESTACK_API_KEY: ${LARGESTACK_API_KEY:-change-me-local-config-only}
      LARGESTACK_DASHBOARD_KEY: ${LARGESTACK_DASHBOARD_KEY:-change-me-local-config-only}
      LARGESTACK_REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-local-redis-password}@redis:6379
      LARGESTACK_POSTGRES_DSN: postgresql://${POSTGRES_USER:-largestack}:${POSTGRES_PASSWORD:-change-me-local-postgres-password}@postgres:5432/${POSTGRES_DB:-largestack}
      LARGESTACK_QDRANT_URL: http://qdrant:6333
      LARGESTACK_AUDIT_LOG_PATH: /var/log/largestack/audit.jsonl
    volumes:
      - largestack_logs:/var/log/largestack
    ports:
      - "${LARGESTACK_HOST_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: largestack-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: ["sh", "-c", "redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass $$REDIS_PASSWORD"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-local-redis-password}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    container_name: largestack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-largestack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres-password}
      POSTGRES_DB: ${POSTGRES_DB:-largestack}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-largestack} -d ${POSTGRES_DB:-largestack}"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: largestack-qdrant
    restart: unless-stopped
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: largestack-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: largestack-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-local-grafana-password}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  redis_data:
  postgres_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  largestack_logs:
