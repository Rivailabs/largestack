# Prometheus scrape config for LARGESTACK
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: largestack

scrape_configs:
  - job_name: largestack
    static_configs:
      - targets: ["largestack:8000"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
