# Alembic configuration for LARGESTACK Agentic AI
#
# Usage:
#   1. Set LARGESTACK_DATABASE_URL env var (or LARGESTACK_POSTGRES_DSN as alias)
#   2. alembic upgrade head    # apply all migrations
#   3. alembic revision --autogenerate -m "msg"  # create new migration
#
# The DB URL is read from env at runtime via env.py — this file does NOT
# contain a hardcoded URL.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is intentionally blank — set via env var (see env.py)
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
