site_name: Largestack AI
site_description: Python framework for agents, RAG, guardrails, observability, and orchestration
site_url: https://docs.largestack.ai
repo_url: https://github.com/Rivailabs/largestack

# API reference and per-error pages are reachable via search + autorefs; not every
# one is listed in the top nav, so don't fail strict builds on that alone.
validation:
  nav:
    omitted_files: info

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
    - scheme: slate
      primary: deep purple
      accent: purple
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            members_order: source
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Architecture: architecture.md
  - Testing and Validation: testing-and-validation.md
  - Examples and Use Cases: examples-and-use-cases.md
  - Security and Governance: security-governance.md
  - OWASP & Red-Team: owasp-coverage.md
  - Deployment: deployment.md
  - Roadmap: roadmap.md
  - Concepts:
    - Agents: concepts/agents.md
    - Tools: concepts/tools.md
    - Memory: concepts/memory.md
    - Workflows: concepts/workflows.md
    - Guardrails: concepts/guardrails.md
  - Cookbook:
    - cookbook/index.md
    - Customer Support: cookbook/support-bot.md
    - RAG with PDFs: cookbook/rag-pdf.md
    - Apache Tika Loader: cookbook/tika-loader.md
    - Multi-Agent: cookbook/multi-agent.md
  - Protocols:
    - MCP: protocols/mcp.md
    - A2A: protocols/a2a.md
    - AG-UI: protocols/agui.md
  - API Reference:
    - Agent: api/agent.md
    - Decorators: api/decorators.md
    - Testing: api/testing.md
