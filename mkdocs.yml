site_name: Largestack AI
site_description: Python framework for agents, RAG, guardrails, observability, and orchestration
site_url: https://docs.largestack.ai
repo_url: https://github.com/Rivailabs/largestack

# API reference and per-error pages are reachable via search + autorefs; not every
# one is listed in the top nav, so don't fail strict builds on that alone.
validation:
  nav:
    omitted_files: info

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
    - scheme: slate
      primary: deep purple
      accent: purple
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            members_order: source
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: quickstart.md
    - Installation: installation.md
    - Configuration: configuration.md
  - Architecture: architecture.md
  - Concepts:
    - Agents: concepts/agents.md
    - Tools: concepts/tools.md
    - Memory: concepts/memory.md
    - Workflows: concepts/workflows.md
    - Guardrails: concepts/guardrails.md
  - Tutorials:
    - First Agent: tutorials/01_first_agent.md
    - Tools & Functions: tutorials/02_tools_and_functions.md
    - Multi-Agent Teams: tutorials/03_multi_agent_teams.md
    - Guardrails: tutorials/04_guardrails.md
    - RAG Knowledge: tutorials/05_rag_knowledge.md
  - Guides:
    - Custom Tools: guides/custom_tools.md
    - Secure RAG Agent: guides/secure_rag.md
    - Cost Control: guides/cost_control.md
    - Testing Agents: guides/testing_agents.md
    - Production Deployment: guides/production_deployment.md
  - Core Topics:
    - RAG: rag.md
    - Orchestration: orchestration-guide.md
    - Durable Orchestration: durable-orchestration.md
    - Observability & Monitoring: observability-monitoring.md
    - Errors: errors.md
    - Fine-tuning: fine_tuning.md
  - Cookbook:
    - cookbook/index.md
    - Customer Support: cookbook/support-bot.md
    - RAG with PDFs: cookbook/rag-pdf.md
    - Apache Tika Loader: cookbook/tika-loader.md
    - Multi-Agent: cookbook/multi-agent.md
    - Structured Output: cookbook/structured-output.md
    - Streaming: cookbook/streaming.md
    - Testing: cookbook/testing.md
